<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Optimized compact logo for small sizes -->
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB366;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pin tail -->
  <path d="M 16 32 L 10 18 Q 10 13 16 13 Q 22 13 22 18 Z" fill="url(#pinGradient)" stroke="#E67E22" stroke-width="0.5" stroke-linejoin="round"/>
  
  <!-- Main circle -->
  <circle cx="16" cy="8" r="7" fill="url(#circleGradient)" stroke="#E67E22" stroke-width="0.6"/>
  
  <!-- Inner highlight -->
  <circle cx="16" cy="8" r="6" fill="none" stroke="#FFCC99" stroke-width="0.4" opacity="0.6"/>
  
  <!-- "S" text -->
  <text x="16" y="11" font-family="Arial, sans-serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#FFFFFF">S</text>
</svg>