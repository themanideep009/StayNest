<svg viewBox="0 0 256 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for depth -->
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB366;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Map Pin Shape -->
  <g>
    <!-- Pin pointer (bottom triangle) -->
    <path d="M 128 320 L 80 180 Q 80 140 128 140 Q 176 140 176 180 Z" fill="url(#pinGradient)" stroke="#E67E22" stroke-width="1.5"/>
    
    <!-- Pin body shadow for depth -->
    <ellipse cx="128" cy="175" rx="45" ry="35" fill="#FF9F3D" opacity="0.3"/>
    
    <!-- Circular badge at top -->
    <circle cx="128" cy="85" r="68" fill="url(#circleGradient)" stroke="#E67E22" stroke-width="2.5"/>
    
    <!-- Inner circle border -->
    <circle cx="128" cy="85" r="62" fill="none" stroke="#FFCC99" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Letter "S" in center -->
    <text x="128" y="105" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#FFFFFF" letter-spacing="0">S</text>
    
    <!-- Highlight for circle -->
    <ellipse cx="105" cy="65" rx="20" ry="15" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- Text "StayNest" below logo -->
  <text x="128" y="260" font-family="Georgia, serif" font-size="28" font-weight="300" text-anchor="middle" fill="#FF9F3D" letter-spacing="1">StayNest</text>
</svg>