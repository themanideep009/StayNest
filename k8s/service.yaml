apiVersion: v1
kind: Service
metadata:
  name: staynest-svc
  namespace: staynest
  labels:
    app: staynest
spec:
  type: ClusterIP          # Ingress handles external traffic; keep this internal
  selector:
    app: staynest
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
