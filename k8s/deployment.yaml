apiVersion: apps/v1
kind: Deployment
metadata:
  name: staynest
  namespace: staynest
  labels:
    app: staynest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: staynest
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploys
  template:
    metadata:
      labels:
        app: staynest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      # ── Security context ────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Containers ──────────────────────────────────────────────────────────
      containers:
        - name: staynest
          # Jenkins replaces IMAGE_PLACEHOLDER with the real ECR image tag
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP

          # ── Non-secret env from ConfigMap ──────────────────────────────────
          envFrom:
            - configMapRef:
                name: staynest-config

          # ── Secret env vars ────────────────────────────────────────────────
          env:
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: staynest-secrets
                  key: session-secret
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: staynest-secrets
                  key: mongo-url

          # ── Resource limits ────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Probes ─────────────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

      # ── Graceful termination ─────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30
