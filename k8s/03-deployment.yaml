apiVersion: apps/v1
kind: Deployment
metadata:
  name: staynest
  namespace: staynest
  labels:
    app: staynest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staynest
  template:
    metadata:
      labels:
        app: staynest
    spec:
      containers:
        - name: staynest
          image: 028969191757.dkr.ecr.us-east-1.amazonaws.com/staynest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: staynest-secrets
                  key: mongo-url
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: staynest-secrets
                  key: session-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
