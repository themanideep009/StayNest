# ─────────────────────────────────────────────────────────────────────────────
#  AWS Load Balancer Controller (ALB) Ingress
#  Prerequisites:
#    - AWS Load Balancer Controller installed on the EKS cluster
#    - ACM certificate ARN for your domain
#    - Replace <YOUR_ACM_CERT_ARN> and <YOUR_DOMAIN> below
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stayhub-ingress
  namespace: stayhub
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: <YOUR_ACM_CERT_ARN>   # ← update
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
spec:
  rules:
    - host: stayhub.yourdomain.com    # ← update to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stayhub-svc
                port:
                  number: 80
