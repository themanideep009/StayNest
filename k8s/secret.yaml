# ─────────────────────────────────────────────────────────────────────────────
#  Stayhub — Kubernetes Secret
#
#  DO NOT commit real values to git.
#  Populate this file with base64-encoded values, or better yet use:
#    - AWS Secrets Manager + External Secrets Operator
#    - kubectl create secret generic stayhub-secret --from-env-file=.env
#
#  To base64-encode a value:
#    echo -n 'my-value' | base64
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: stayhub-secret
  namespace: stayhub
type: Opaque
data:
  # Replace every <base64-...> placeholder with your actual base64-encoded value
  SESSION_SECRET: <base64-session-secret>
  JWT_SECRET: <base64-jwt-secret>
  MONGO_URL: <base64-mongodb-atlas-connection-string>

  # Google OAuth
  GOOGLE_CLIENT_ID: <base64-google-client-id>
  GOOGLE_CLIENT_SECRET: <base64-google-client-secret>

  # Twilio
  TWILIO_ACCOUNT_SID: <base64-twilio-account-sid>
  TWILIO_AUTH_TOKEN: <base64-twilio-auth-token>
  TWILIO_VERIFY_SERVICE_SID: <base64-twilio-verify-service-sid>

  # SMTP
  SMTP_USER: <base64-smtp-user>
  SMTP_PASS: <base64-smtp-pass>
